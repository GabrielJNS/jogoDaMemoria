<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Jogo da Memória - Steven Universe</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
</head>
<body>
    <div class="background-stars"></div>
    <div class="container">
        <div class="game-card">
            <div class="header">
                <h1>✨ Jogo da Memória ✨</h1>
                <p>🔮 Steven Universe 🔮</p>
            </div>

            <div class="player-setup">
                <input type="text" id="player-name" placeholder="Seu nome, fofa!" autocomplete="off">
                <select id="grid-size-select">
                    <option value="4">🌱 4x4 - Fácil</option>
                    <option value="6">🍬 6x6 - Médio</option>
                    <option value="10">🌈 10x10 - Desafio</option>
                </select>
                <button id="create-room">🎈 Criar Sala</button>
            </div>

            <div class="room-info-bar">
                <div class="room-code" id="room-code">🏠 Sala: ---</div>
                <button id="share-room">📎 Compartilhar</button>
            </div>

            <div class="players-area">
                <div class="player-card player1-card">
                    <div class="avatar">⭐</div>
                    <h3>Jogador 1</h3>
                    <p id="player1-name">Aguardando...</p>
                    <div class="points">💎 Pontos: <span id="score-p1">0</span></div>
                </div>
                <div class="player-card player2-card">
                    <div class="avatar">🌟</div>
                    <h3>Jogador 2</h3>
                    <p id="player2-name">Aguardando...</p>
                    <div class="points">🍭 Pontos: <span id="score-p2">0</span></div>
                </div>
            </div>

            <div class="turn-status" id="status-message">
                🎀 Aguardando jogadores...
            </div>

            <div class="board-wrapper">
                <div class="memory-board" id="memory-board"></div>
            </div>

            <button id="restart-game" class="restart-btn">🔄 Nova Rodada</button>
        </div>
    </div>

    <div id="victory-overlay">
        <div class="victory-box">
            <h2 id="winner-message"></h2>
            <button id="close-overlay">💖 Fechar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
